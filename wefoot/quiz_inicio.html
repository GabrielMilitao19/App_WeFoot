<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeFoot - Quiz Início</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root{--black:#0d1117;--white:#ffffff;--green:#1a9c3e;--gray-dark:#666666;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
        body{background-color:#1a9c3e;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        a{text-decoration:none;color:inherit;}
        .app-container{width:390px;height:844px;background-color:var(--white);position:relative;overflow:hidden;display:flex;flex-direction:column;border:8px solid var(--black);border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
        header{display:flex;justify-content:center;align-items:center;padding:18px 24px 14px;border-bottom:3px solid var(--black);background-color:var(--black);z-index:10;flex-shrink:0;position:relative;}
        .logo-container{display:flex;align-items:center;gap:10px;}
        .logo-icon{width:26px;height:26px;background-color:var(--green);mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;-webkit-mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;}
        .app-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:-1px;}
        .header-back{position:absolute;left:20px;font-size:22px;font-weight:800;cursor:pointer;color:var(--white);}
        .main-content{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;}
        .emoji-bg{width:100px;height:100px;background-color:#e8f7ed;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:8px;}
        h1{font-size:22px;font-weight:800;line-height:1.3;color:var(--black);}
        p{font-size:14px;color:var(--gray-dark);line-height:1.5;}
        .btn-primary{width:100%;padding:15px;font-size:15px;font-weight:800;text-align:center;background-color:var(--green);color:var(--white);border:none;border-radius:30px;cursor:pointer;display:block;}
        .btn-link{text-align:center;font-size:13px;font-weight:600;color:var(--green);background:none;border:none;cursor:pointer;text-decoration:underline;display:block;}
        .bottom-actions{width:100%;padding-top:20px;display:flex;flex-direction:column;gap:12px;}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <a href="cadastro_localizacao.html" class="header-back">&lt;</a>
            <div class="logo-container"><div class="logo-icon"></div><div class="app-title">WeFoot</div></div>
        </header>
        <div class="main-content">
            <div class="emoji-bg">📝</div>
            <h1>Personalize seu perfil e encontre torcedores com os mesmos interesses</h1>
            <p>Responda algumas perguntas rápidas para melhorar sua experiência!</p>
            <div class="bottom-actions">
                <a href="quiz_objetivo.html" class="btn-primary">Começar Quiz</a>
                <a href="feed_futebol.html" class="btn-link">Mais tarde</a>
            </div>
        </div>
    </div>
</body>
</html>

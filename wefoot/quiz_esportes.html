<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeFoot - Esportes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root{--black:#0d1117;--white:#ffffff;--green:#1a9c3e;--green-light:#e8f7ed;--gray-medium:#e0e0e0;--gray-dark:#666666;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
        body{background-color:#1a9c3e;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        a{text-decoration:none;color:inherit;}
        .app-container{width:390px;height:844px;background-color:var(--white);position:relative;overflow:hidden;display:flex;flex-direction:column;border:8px solid var(--black);border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
        header{display:flex;justify-content:center;align-items:center;padding:18px 24px 14px;border-bottom:3px solid var(--black);background-color:var(--black);z-index:10;flex-shrink:0;position:relative;}
        .logo-container{display:flex;align-items:center;gap:10px;}
        .logo-icon{width:26px;height:26px;background-color:var(--green);mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;-webkit-mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;}
        .app-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:-1px;}
        .header-back{position:absolute;left:20px;font-size:22px;font-weight:800;cursor:pointer;color:var(--white);}
        .main-content{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
        .step-label{font-size:12px;font-weight:700;color:var(--green);letter-spacing:1px;text-transform:uppercase;}
        h1{font-size:20px;font-weight:800;line-height:1.3;color:var(--black);}
        p{font-size:13px;color:var(--gray-dark);line-height:1.5;}
        .sports-grid{display:flex;flex-wrap:wrap;gap:8px;}
        .sport-pill{padding:9px 14px;border:2px solid var(--gray-medium);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--black);}
        .sport-pill:hover{border-color:var(--green);}
        .sport-pill.active{background-color:var(--green);border-color:var(--green);color:var(--white);}
        .btn-primary{width:100%;padding:15px;font-size:15px;font-weight:800;text-align:center;background-color:var(--green);color:var(--white);border:none;border-radius:30px;cursor:pointer;display:block;}
        .bottom-actions{margin-top:auto;padding-top:16px;display:flex;flex-direction:column;gap:12px;}
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.sport-pill').forEach(pill => {
                pill.addEventListener('click', () => pill.classList.toggle('active'));
            });
        });
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <a href="quiz_objetivo.html" class="header-back">&lt;</a>
            <div class="logo-container"><div class="logo-icon"></div><div class="app-title">WeFoot</div></div>
        </header>
        <div class="main-content">
            <div class="step-label">Quiz · 2 de 2</div>
            <h1>Quais são seus esportes favoritos?</h1>
            <p>Selecione todos que quiser!</p>
            <div class="sports-grid">
                <div class="sport-pill active">⚽ Futebol</div>
                <div class="sport-pill">🏀 Basquete</div>
                <div class="sport-pill">🏐 Vôlei</div>
                <div class="sport-pill">🏎️ Fórmula 1</div>
                <div class="sport-pill">🛹 Skate</div>
                <div class="sport-pill">🎮 E-sports</div>
                <div class="sport-pill">🐎 Hipismo</div>
                <div class="sport-pill">🏄 Surf</div>
                <div class="sport-pill">🤾 Handebol</div>
                <div class="sport-pill">🏈 Fut. Americano</div>
                <div class="sport-pill">🏊 Natação</div>
                <div class="sport-pill">⚾ Beisebol</div>
                <div class="sport-pill">🎾 Tênis</div>
                <div class="sport-pill">🥊 Boxe</div>
                <div class="sport-pill">🥋 Judô</div>
                <div class="sport-pill">🏒 Hóquei</div>
                <div class="sport-pill">🥊 UFC</div>
                <div class="sport-pill">🏉 Rugby</div>
            </div>
            <div class="bottom-actions">
                <a href="premium.html" class="btn-primary">Continuar</a>
            </div>
        </div>
    </div>
</body>
</html>

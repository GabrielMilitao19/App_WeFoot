<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeFoot - Conhecer Torcedores</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root{--black:#0d1117;--white:#ffffff;--green:#1a9c3e;--green-light:#e8f7ed;--gray-light:#f4f4f4;--gray-medium:#e0e0e0;--gray-dark:#666666;}
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
        body{background-color:#1a9c3e;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        a{text-decoration:none;color:inherit;}
        .app-container{width:390px;height:844px;background-color:var(--gray-light);position:relative;overflow:hidden;display:flex;flex-direction:column;border:8px solid var(--black);border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
        header{display:flex;justify-content:center;align-items:center;padding:18px 24px 14px;border-bottom:3px solid var(--black);background-color:var(--black);z-index:10;flex-shrink:0;}
        .logo-container{display:flex;align-items:center;gap:10px;}
        .logo-icon{width:26px;height:26px;background-color:var(--green);mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;-webkit-mask:url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="black"/></svg>') no-repeat center/contain;}
        .app-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:-1px;}
        .main-content{flex:1;overflow-y:auto;padding:14px 16px 90px;display:flex;flex-direction:column;gap:12px;}
        .filters{display:flex;gap:8px;margin-bottom:4px;overflow-x:auto;padding-bottom:2px;}
        .filters::-webkit-scrollbar{display:none;}
        .filter-chip{padding:7px 13px;border:2px solid var(--gray-medium);border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;background-color:var(--white);cursor:pointer;color:var(--black);transition:all .15s;}
        .filter-chip.active{background-color:var(--green);border-color:var(--green);color:var(--white);}
        .fan-card{background-color:var(--white);border:2px solid var(--black);border-radius:16px;padding:16px;box-shadow:3px 3px 0px var(--black);display:flex;flex-direction:row;align-items:center;justify-content:space-between;flex-shrink:0;}
        .fan-info-wrapper{display:flex;align-items:center;gap:12px;}
        .avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--black);object-fit:cover;}
        .user-info{display:flex;flex-direction:column;gap:2px;}
        .user-name{font-weight:800;font-size:15px;color:var(--black);}
        .user-team{font-weight:600;font-size:12px;color:var(--gray-dark);}
        .fan-distance{font-size:11px;font-weight:800;background-color:var(--green);color:var(--white);padding:3px 8px;border-radius:8px;display:inline-block;}
        .connect-btn{padding:8px 16px;background-color:var(--white);border:2px solid var(--black);border-radius:20px;font-weight:800;font-size:13px;cursor:pointer;box-shadow:2px 2px 0px var(--black);display:inline-block;color:var(--black);transition:background-color .15s,color .15s;}
        .connect-btn:hover{background-color:var(--green);border-color:var(--green);color:var(--white);}
        .bottom-nav{position:absolute;bottom:0;left:0;right:0;height:76px;background-color:var(--black);border-top:3px solid var(--black);display:flex;justify-content:space-around;align-items:center;padding-bottom:16px;z-index:10;}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:rgba(255,255,255,.4);}
        .nav-item.active{color:var(--green);}
        .nav-icon{width:22px;height:22px;background-color:currentColor;-webkit-mask-size:contain;-webkit-mask-repeat:no-repeat;-webkit-mask-position:center;mask-size:contain;mask-repeat:no-repeat;mask-position:center;}
        .icon-feed{-webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>');}
        .icon-meet{-webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>');}
        .icon-profile{-webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');}
        .nav-text{font-size:11px;font-weight:600;}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-container"><div class="logo-icon"></div><div class="app-title">WeFoot</div></div>
        </header>
        <div class="main-content">
            <div class="filters">
                <div class="filter-chip active">Meus Times</div>
                <div class="filter-chip">Até 10km</div>
                <div class="filter-chip">Futebol</div>
                <div class="filter-chip">Filtros</div>
            </div>
            <div class="fan-card">
                <div class="fan-info-wrapper">
                    <img src="https://i.pravatar.cc/100?img=33" alt="Pedro" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Pedro Alves</span>
                        <span class="user-team">Grêmio</span>
                        <span class="fan-distance">📍 a 2.5 km</span>
                    </div>
                </div>
                <a href="perfil_pedroalves.html" class="connect-btn">Conectar</a>
            </div>
            <div class="fan-card">
                <div class="fan-info-wrapper">
                    <img src="https://i.pravatar.cc/100?img=45" alt="Luana" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Luana Mendes</span>
                        <span class="user-team">Boston Celtics</span>
                        <span class="fan-distance">📍 a 4.1 km</span>
                    </div>
                </div>
                <a href="perfil_luanamendes.html" class="connect-btn">Conectar</a>
            </div>
        </div>
        <nav class="bottom-nav">
            <a href="feed_futebol.html" class="nav-item">
                <div class="nav-icon icon-feed"></div><span class="nav-text">Feed</span>
            </a>
            <a href="meet_fans.html" class="nav-item active">
                <div class="nav-icon icon-meet"></div><span class="nav-text">Conhecer</span>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-icon icon-profile"></div><span class="nav-text">Perfil</span>
            </a>
        </nav>
    </div>
</body>
</html>

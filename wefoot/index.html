<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeFoot - Entrar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --black: #0d1117;
            --white: #ffffff;
            --green: #1a9c3e;
            --green-dark: #157a31;
            --green-light: #e8f7ed;
            --gray-light: #f4f4f4;
            --gray-medium: #e0e0e0;
            --gray-dark: #666666;
            --border-width: 3px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #1a9c3e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        .app-container {
            width: 390px; height: 844px;
            background-color: var(--black);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            border: 8px solid var(--black); border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .main-content { flex: 1; overflow-y: auto; padding: 40px 28px 28px; display: flex; flex-direction: column; gap: 16px; justify-content: center; }
        .logo-area { text-align: center; margin-bottom: 36px; }
        .logo-mark {
            width: 72px; height: 72px; margin: 0 auto 16px;
            background-color: var(--green);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-mark svg { width: 44px; height: 44px; fill: white; }
        h1 { font-size: 28px; font-weight: 800; color: var(--white); letter-spacing: -1px; }
        .tagline { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
        label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
        input {
            width: 100%; padding: 14px 16px; font-size: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background-color: rgba(255,255,255,0.07);
            color: var(--white); outline: none;
            transition: border-color 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.3); }
        input:focus { border-color: var(--green); }
        .btn-primary {
            width: 100%; padding: 16px; font-size: 15px; font-weight: 800;
            text-align: center; background-color: var(--green); color: var(--white);
            border: none; border-radius: 30px; cursor: pointer; display: block;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background-color: var(--green-dark); transform: translateY(-1px); }
        .btn-secondary {
            width: 100%; padding: 15px; font-size: 15px; font-weight: 800;
            text-align: center; background-color: transparent; color: var(--white);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 30px; cursor: pointer; display: block;
            transition: border-color 0.2s;
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.5); }
        .btn-link { text-align: center; font-size: 13px; font-weight: 600; color: var(--green); background: none; border: none; cursor: pointer; display: block; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 4px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
        .divider span { font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 600; }
        .bottom-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-content">
            <div class="logo-area">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
                <h1>WeFoot</h1>
                <p class="tagline">De torcedor para torcedor</p>
            </div>
            <div class="input-group">
                <label>Email ou usuário</label>
                <input type="text" placeholder="Insira seus dados">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Sua senha">
            </div>
            <div class="bottom-actions">
                <a href="feed_futebol.html" class="btn-primary">Entrar</a>
                <a href="recuperar_senha.html" class="btn-link">Esqueceu a senha?</a>
                <div class="divider"><span>OU</span></div>
                <a href="cadastro_email.html" class="btn-secondary">Criar nova conta</a>
            </div>
        </div>
    </div>
</body>
</html>
